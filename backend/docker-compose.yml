version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pulp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pulp_db
      MYSQL_USER: pulpuser
      MYSQL_PASSWORD: pulppassword
    ports:
      - "3306:3306"
    volumes:
      - pulp_mysql_data:/var/lib/mysql

volumes:
  pulp_mysql_data:
